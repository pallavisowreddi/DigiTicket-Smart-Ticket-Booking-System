<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0; /* Off-white background */
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #E6D5B8; /* Sand background */
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-logo {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 120px;
        }
        .login-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #000;
            font-family: Arial, sans-serif;
            letter-spacing: -0.5px;
        }
        .desc-text {
            color: #555;
            font-size: 14px;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.5;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
        }
        .form-input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: #FFF;
            font-size: 15px;
            color: #333;
            box-sizing: border-box;
            font-weight: 600;
            outline: none;
        }
        .form-input::placeholder {
            color: #888;
            font-weight: 600;
        }
        .btn-black {
            width: 100%;
            padding: 16px;
            background-color: #000;
            color: #FFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: background 0.2s;
        }
        .btn-black:hover {
            background-color: #222;
        }
        .back-link {
            margin-top: 25px;
            font-size: 15px;
            font-weight: 600;
        }
        .back-link a {
            color: #D9534F; /* Red color matching image */
            text-decoration: none;
        }
    </style>
</head>
<body>
    
    <div class="login-box">
        <a href="index.html">
            <img src="../client/src/assets/logo.svg" alt="DigiTicket" class="login-logo" onerror="this.src='logo.svg'">
        </a>
        <h1 class="login-title">Forgot Password?</h1>
        <p class="desc-text">Enter your registered email address and we'll send you a link to reset your password.</p>

        <form id="forgotForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="user@example.com" required>
            </div>
            <button type="submit" class="btn-black" id="resetBtn">Reset Password</button>
        </form>

        <div class="back-link">
            <a href="login.html">Back to login</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById("forgotForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const btn = document.getElementById("resetBtn");
            btn.innerText = "Sending link...";
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                alert("If that email exists in our system, a password reset link has been sent.");
                window.location.href = "login.html";
            }, 1000);
        });
    </script>
</body>
</html>
