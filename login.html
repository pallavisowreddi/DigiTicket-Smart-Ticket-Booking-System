<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0; /* Off-white background */
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #E6D5B8; /* Sand background */
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-logo {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 120px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #000;
            font-family: Arial, sans-serif;
            letter-spacing: -0.5px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
        }
        .form-input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: #FFF;
            font-size: 16px;
            color: #333;
            box-sizing: border-box;
            font-weight: 600;
            outline: none;
        }
        .form-input::placeholder {
            color: #888;
            font-weight: 600;
        }
        .forgot-pass {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 30px;
        }
        .forgot-pass a {
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }
        .btn-black {
            width: 100%;
            padding: 18px;
            background-color: #000;
            color: #FFF;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.2s;
        }
        .btn-black:hover {
            background-color: #222;
        }
        
        .btn-google {
            width: 100%;
            padding: 16px;
            background-color: #FFF;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .signup-text {
            font-size: 15px;
            color: #555;
            font-weight: 600;
            margin-top: 25px;
        }
        .signup-text a {
            color: #D9534F; /* Red color matching image */
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <a href="index.html">
            <img src="../client/src/assets/logo.svg" alt="DigiTicket" class="login-logo" onerror="this.src='logo.svg'">
        </a>
        <h1 class="login-title">Welcome Back</h1>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <div class="forgot-pass">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-black">Login</button>
        </form>

        <button class="btn-google" onclick="window.location.href='oauth.html'">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
        </button>

        <div class="signup-text">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('digiticket_token', data.token);
                    if(data.user) localStorage.setItem('digiticket_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert('Login failed: ' + data.msg);
                }
            } catch (err) {
                console.error(err);
                alert("Network error. Could not reach server.");
            }
        });
    </script>
</body>
</html>
