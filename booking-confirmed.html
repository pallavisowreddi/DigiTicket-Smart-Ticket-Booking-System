<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 40px; background: transparent; max-width: 900px; margin: 0 auto;
        }
        .nav-logo { display:flex; align-items:center; }
        .nav-logo img { height: 45px; }

        .container { max-width: 900px; margin: 60px auto; padding: 20px; text-align: center; }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: #FFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .success-icon-inner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #1E8C45;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-check {
            color: #1E8C45;
            font-size: 50px;
            font-weight: bold;
            line-height: 1;
        }

        .title {
            font-family: 'Times New Roman', serif;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #000;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            color: #000;
            margin-bottom: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn-view-ticket {
            background: #E6D5B8;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-weight: 700;
            font-family: 'Times New Roman', serif;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="display:flex; align-items:center;">
             <a href="index.html" style="font-size:30px; text-decoration:none; color:#000; font-weight:bold; margin-right:15px;" onclick="history.back()">&#8592;</a>
             <a href="index.html" class="nav-logo"><img src="../client/src/assets/logo.svg" alt="DigiTicket" onerror="this.src='logo.svg'"></a>
        </div>
    </header>

    <main class="container">
        <div class="success-icon">
            <div class="success-icon-inner">
                <span class="success-check">&#10003;</span>
            </div>
        </div>

        <div class="title">Booking confirmed</div>
        <div class="subtitle">Your flight booking has been successfully confirmed</div>

        <button class="btn-view-ticket" id="btnContinue">View ticket details</button>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById("btnContinue").addEventListener("click", () => {
            const params = new URLSearchParams(window.location.search);
            const bookingId = params.get('id');
            const targetUrl = bookingId ? `booking-success.html?id=${bookingId}` : `booking-success.html`;
            window.location.href = targetUrl;
        });
    </script>
</body>
</html>
