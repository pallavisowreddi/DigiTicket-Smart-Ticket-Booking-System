<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #E2CAAA; /* Exact darker sand tone from Figma */
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 40px; background: transparent; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }
        .nav-logo { display:flex; align-items:center; }
        .nav-logo img { height: 60px; }

        .menu-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            padding-bottom: 50px;
        }

        .menu-btn {
            background-color: #FFF;
            color: #000;
            font-size: 14px;
            font-weight: 700;
            padding: 18px 40px;
            border-radius: 40px;
            text-decoration: none;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s, background-color 0.2s;
            letter-spacing: 0.5px;
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            background-color: #FAFAFA;
        }

        .btn-logout {
            background-color: #000;
            color: #FFF;
            margin-top: 30px;
        }
        .btn-logout:hover {
            background-color: #222;
        }

    </style>
</head>
<body>

    <header class="navbar">
        <div style="display:flex; align-items:center;">
             <a href="index.html" style="font-size:36px; text-decoration:none; color:#000; font-weight:bold; margin-right:15px; margin-top:-5px;" onclick="history.back()">&#8592;</a>
             <a href="index.html" class="nav-logo"><img src="../client/src/assets/logo.svg" alt="DigiTicket" onerror="this.src='logo.svg'"></a>
        </div>
    </header>

    <main class="menu-container">
        <a href="profile.html" class="menu-btn">My profile</a>
        <a href="dashboard.html" class="menu-btn">My Bookings</a>
        <a href="#" class="menu-btn" onclick="alert('Payment status integrated via bank gateway!')">Payment Status</a>
        <a href="cancel-booking.html" class="menu-btn">Cancel Booking</a>
        <a href="dashboard.html" class="menu-btn">Cancellations</a>
        
        <a href="login.html" class="menu-btn btn-logout" onclick="localStorage.removeItem('digiticket_token')">Log Out</a>
    </main>

    <script src="script.js"></script>
</body>
</html>
