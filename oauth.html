<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google SignIn - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .oauth-container {
            max-width: 480px;
            margin: 80px auto;
        }
        .oauth-box {
            background-color: #E6D5B8;
            border-radius: 20px;
            padding: 40px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .back-nav {
            text-align: left; margin-bottom: 20px;
        }
        .back-nav a {
            color: #000; text-decoration: none; font-weight: 700; font-size: 24px;
        }
        
        .oauth-box h1 {
            font-size: 24px;
            font-family: 'Times New Roman', serif;
            color: #000;
            margin-bottom: 8px;
        }
        .oauth-box p {
            color: #333;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .account-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #FFF;
            color: #000;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .account-bar:hover {
            transform: translateY(-2px);
        }
        .acc-icon {
            width: 40px; height: 40px;
            background: #4285F4; color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px;
        }
        
        .btn-cancel {
            background: #FFF;
            color: #000;
            border: 2px solid #000;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="oauth-container">
        <div class="oauth-box">
            <div class="back-nav">
                <a href="login.html">&#8592;</a>
            </div>
            <h1>Choose an account</h1>
            <p>To continue to DigiTicket</p>

            <div class="account-bar" onclick="proceedGoogleLogin()">
                <div class="acc-icon">S</div>
                <div style="display: flex; flex-direction: column; text-align: left;">
                    <span style="font-weight: 700; font-size: 15px;">Student User</span>
                    <span style="font-size: 12px; color: #555; font-weight: 500;">xyz@gmail.com</span>
                </div>
            </div>

            <button class="btn-cancel" onclick="window.location.href='login.html'">Cancel</button>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function proceedGoogleLogin() {
            const msg = document.createElement("p");
            msg.innerText = "Authenticating...";
            msg.style.fontWeight = "bold";
            msg.style.marginTop = "15px";
            document.querySelector('.oauth-box').appendChild(msg);
            
            setTimeout(() => {
                // Set a dummy user payload
                localStorage.setItem("digiticket_user", JSON.stringify({
                    name: "Student User",
                    email: "xyz@gmail.com",
                    role: "user"
                }));
                localStorage.setItem("digiticket_token", "dummy_oauth_token");
                window.location.href = "index.html";
            }, 800);
        }
    </script>
</body>
</html>
