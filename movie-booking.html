<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Summary - Movies - DigiTicket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 60px;
        }
        /* Top Navigation */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            background: transparent;
        }
        .nav-logo img { height: 45px; }
        
        .profile-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #000; text-decoration: none; font-size: 11px; font-weight: 700; font-family:"Times New Roman", Times, serif; letter-spacing: 0.5px;
        }
        .profile-btn span.icon {
            width: 30px; height: 30px; border-radius: 50%; background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Layout Grid */
        .booking-content {
            max-width: 900px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 25px;
            align-items: start;
        }
        
        /* Shared Panel Styling */
        .box-panel {
            background-color: #E6D5B8;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            margin-bottom: 25px;
        }
        .box-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #000;
            text-align: center;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.5px;
        }

        /* Route specifics */
        .route-title { font-size: 20px; font-weight: 800; color: #000; font-family: 'Times New Roman', serif; }
        .route-sub { font-size: 12px; font-weight: 600; color: #333; margin-top: 4px; line-height: 1.4; }

        /* Forms */
        .form-label {
            display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #000;
            font-family: "Times New Roman", serif; text-align: left;
        }
        .form-input {
            width: 100%; padding: 12px 14px; border: none; background-color: #FFF;
            font-size: 13px; color: #000; box-sizing: border-box; font-weight: 600; margin-bottom: 16px; outline: none;
        }
        .form-input::placeholder { color: #888; font-weight: 500; font-family: "Times New Roman", serif; font-size: 12px;}
        
        /* Summary specifics */
        .summary-row {
            display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 16px; color: #000; font-weight: 600; font-family: 'Inter', sans-serif;
        }
        .summary-row .val { font-weight: 800; font-size: 13px; }
        hr.solid { border: none; border-top: 1px solid #000; margin: 15px 0; }
        .summary-total {
            display: flex; justify-content: space-between; font-weight: 800; font-size: 16px; color: #000; align-items: center;
        }
        .total-price { font-size: 18px; font-weight: 800; }

        /* Actions */
        .action-row {
            display: flex; gap: 15px; margin-top: 20px;
        }
        .action-row .btn-back {
            background: #FFF; color: #000; border: 2px solid #000; border-radius: 30px;
            padding: 12px 30px; font-weight: 700; font-size: 14px; cursor: pointer; min-width: 110px;
        }
        .action-row .btn-confirm {
            background: #D9534F; color: #FFF; border: none; border-radius: 30px;
            padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; flex: 1;
        }

    </style>
</head>
<body>

    <header class="navbar">
        <div style="display:flex; align-items:center;">
             <a href="#" style="font-size:24px; text-decoration:none; color:#000; font-weight:bold; margin-right:10px;" onclick="history.back()">&#8592;</a>
             <a href="index.html" class="nav-logo"><img src="../client/src/assets/logo.svg" alt="DigiTicket" onerror="this.src='logo.svg'"></a>
        </div>
        <div style="display:flex; align-items:center; gap: 20px;">
            <span style="font-weight: 700; color: #000; font-size:14px;">Movies</span>
            <a href="profile-menu.html" class="profile-btn" style="margin-left: 20px;">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </span>
                My Profile
            </a>
        </div>
    </header>

    <form id="bookingForm" style="max-width: 900px; margin: 0 auto;">
        <div class="booking-content">
            
            <!-- Left Column -->
            <div class="left-col">
                <!-- Movie Details container -->
                <div class="box-panel" style="display:flex; justify-content:space-between; align-items:center; border-radius: 30px;">
                    <div style="display:flex; flex-direction:column;">
                        <span class="route-title">Dhurandhar</span>
                        <span class="route-sub">INOX: NCS Mall, Guntur</span>
                    </div>
                    <div class="route-sub" style="text-align:right;">
                        Date: <span style="font-weight:800; color:#000;">10 Oct 2026</span><br>
                        Time: <span style="font-weight:800; color:#000;">09:15 PM</span>
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="box-panel">
                    <div class="box-header">Contact Information</div>
                    
                    <label class="form-label">Full Name :</label>
                    <input type="text" id="full-name" class="form-input" placeholder="Your Name" required>
                    
                    <label class="form-label">Mobile Number :</label>
                    <input type="tel" class="form-input" placeholder="Your Number" required>
                    
                    <label class="form-label">Email ID :</label>
                    <input type="email" class="form-input" placeholder="Your Email">
                </div>

                <!-- Seat Details -->
                <div class="box-panel">
                    <div class="box-header">Seats Overview</div>
                    <input type="text" class="form-input" style="flex:1; margin-bottom:0;" value="Selected Seats: E10, E11, E12" readonly>
                </div>
            </div>

            <!-- Right Column -->
            <div class="right-col">
                <!-- Summary Info -->
                <div class="box-panel" style="border-radius:30px;">
                    <div class="box-header">Summary</div>
                    <br>
                    <div class="summary-row">
                        <span>Ticket Cost (3 x 150)</span>
                        <span class="val">₹ 450</span>
                    </div>
                    <div class="summary-row">
                        <span>Convenience Fee</span>
                        <span class="val">₹ 50</span>
                    </div>
                    <hr class="solid">
                    <div class="summary-total">
                        <span>Total</span>
                        <span class="total-price">₹ 500</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="action-row" style="max-width:800px; margin: 0 auto;">
            <button type="button" class="btn-back" onclick="history.back()">Back</button>
            <button type="submit" class="btn-confirm">Confirm Booking</button>
        </div>
        
        <p id="b-msg" style="text-align: center; margin-top: 20px; font-weight: bold;"></p>
    </form>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const user = JSON.parse(localStorage.getItem("digiticket_user") || "{}");
            if(user.name) {
                document.getElementById('full-name').value = user.name;
            }
        });

        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const token = localStorage.getItem("digiticket_token");
            if (!token) {
                alert("Please log in first!");
            }

            const payload = {
                bookingType: "movie",
                totalAmount: 500,
                passengers: [{ name: document.getElementById("full-name").value, age: 25 }]
            };

            const msg = document.getElementById("b-msg");
            msg.style.color = "blue";
            msg.innerText = "Processing checkout...";

            try {
                const res = await fetch("http://localhost:5000/api/bookings", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                setTimeout(() => {
                    window.location.href = `movie-booking-confirmed.html?id=${data.booking ? data.booking.bookingId : (data._id || 'DT-M-819')}`;
                }, 800);
            } catch (err) {
                console.log(err);
                setTimeout(() => {
                    window.location.href = `movie-booking-confirmed.html?id=DT-M-819`;
                }, 800);
            }
        });
    </script>
</body>
</html>
